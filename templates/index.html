<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link to CSS file for styling -->
</head>
<body>
    <header>
        <h1>Dashboard</h1>
    </header>
    <main>
        <section class="stats">
            <div class="stat-card">
                <h2>Total Clients</h2>
                <p>150</p>
            </div>
            <div class="stat-card">
                <h2>Average Score</h2>
                <p>85%</p>
            </div>
            <div class="stat-card">
                <h2>New Visitors</h2>
                <p>75</p>
            </div>
        </section>
        <section class="audit-list">
            <h2>Audit List</h2>
            <table>
                <thead>
                    <tr>
                        <th>Client Name</th>
                        <th>Industry</th>
                        <th>Website</th>
                        <th>Score</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Client A</td>
                        <td>Healthcare</td>
                        <td><a href="http://client-a.com">client-a.com</a></td>
                        <td>90</td>
                        <td><button>View</button></td>
                    </tr>
                    <tr>
                        <td>Client B</td>
                        <td>Finance</td>
                        <td><a href="http://client-b.com">client-b.com</a></td>
                        <td>80</td>
                        <td><button>View</button></td>
                    </tr>
                    <tr>
                        <td>Client C</td>
                        <td>Education</td>
                        <td><a href="http://client-c.com">client-c.com</a></td>
                        <td>75</td>
                        <td><button>View</button></td>
                    </tr>
                    <!-- Add more clients as needed -->
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Neuralis Black</p>
    </footer>
</body>
</html>
