<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO Audit Intake Form</title>
</head>
<body>
    <h1>GEO Audit Intake Form</h1>
    <form>
        <h2>Business Profile</h2>
        <label for="businessName">Business Name:</label>
        <input type="text" id="businessName" name="businessName" required><br><br>

        <label for="businessDescription">Business Description:</label>
        <textarea id="businessDescription" name="businessDescription" required></textarea><br><br>

        <label for="location">Location:</label>
        <input type="text" id="location" name="location" required><br><br>

        <h2>Digital Presence</h2>
        <label for="website">Website:</label>
        <input type="url" id="website" name="website"><br><br>

        <label for="socialMedia">Social Media Links:</label>
        <input type="text" id="socialMedia" name="socialMedia" placeholder="e.g., Facebook, Twitter"><br><br>

        <h2>Goals</h2>
        <label for="shortTermGoals">Short Term Goals:</label>
        <textarea id="shortTermGoals" name="shortTermGoals"></textarea><br><br>

        <label for="longTermGoals">Long Term Goals:</label>
        <textarea id="longTermGoals" name="longTermGoals"></textarea><br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
