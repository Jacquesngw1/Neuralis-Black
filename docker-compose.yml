version: '3.8'

services:
  neuralis-black:
    image: neuralis-black:latest
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=mysql://user:password@db:3306/neuralis
    volumes:
      - ./data:/data

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: neuralis
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: